<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Library — choosewise.education</title>
  <meta name="description" content="Free downloadable prompt packs for teachers, school leaders, and other roles in education.">
  <meta property="og:title" content="Prompt Library — choosewise.education">
  <meta property="og:description" content="Free downloadable prompt packs for teachers, school leaders, and other roles in education.">
  <meta property="og:image" content="/assets/images/brand/og-default.svg">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body>
  <div data-include="/assets/partials/header-en.html"></div>

  <main>
    <section class="page-hero container">
      <span class="eyebrow" data-reveal>Prompts</span>
      <h1 data-reveal>Prompt Library</h1>
      <p class="lede" data-reveal>Free prompt packs. Download. Use. Share. More added regularly.</p>
    </section>

    <section class="container section">
      <div class="filters" data-reveal>
        <label>Role:
          <select id="filter-role">
            <option value="">All</option>
            <option>Teacher</option>
            <option>Principal</option>
            <option>School Leader</option>
            <option>Special Education</option>
          </select>
        </label>
        <label>Topic:
          <select id="filter-topic">
            <option value="">All</option>
            <option>Pedagogy</option>
            <option>Assessment</option>
            <option>Planning</option>
            <option>Leadership</option>
          </select>
        </label>
      </div>
      <div class="prompts-grid" id="prompts-grid" data-source="/prompts/prompts-en.json" data-template="prompt"></div>
    </section>
  </main>

  <div data-include="/assets/partials/footer-en.html"></div>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" integrity="sha384-Z3REaz79l2IaAZqJsSABtTbhjgOUYyV3p90XNnAPCSHg3EMTz1fouunq9WZRtj3d" crossorigin="anonymous"></script>
  <script defer src="/assets/js/include.js"></script>
  <script defer src="/assets/js/render-grid.js"></script>
  <script defer src="/assets/js/scroll-reveals.js"></script>
  <script>
    // Simple client-side filter on Role x Topic
    document.getElementById('prompts-grid').addEventListener('grid:rendered', () => {
      const role = document.getElementById('filter-role');
      const topic = document.getElementById('filter-topic');
      const cards = document.querySelectorAll('.card--prompt');

      function apply() {
        cards.forEach(c => {
          const meta = c.querySelector('.card__meta').textContent;
          const roleOk = !role.value || meta.includes(role.value);
          const topicOk = !topic.value || meta.includes(topic.value);
          c.style.display = (roleOk && topicOk) ? '' : 'none';
        });
      }
      role.addEventListener('change', apply);
      topic.addEventListener('change', apply);
    });
  </script>
</body>
</html>
