<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body { background: #f7f4ec; display: flex; align-items: center; justify-content: center; gap: 100px; padding: 60px 120px; font-family: 'Work Sans', sans-serif; }
  svg { width: 680px; height: 680px; flex-shrink: 0; }
  .right { display: flex; flex-direction: column; justify-content: center; gap: 40px; max-width: 700px; }
  .right h2 { font-family: 'Fraunces', Georgia, serif; font-size: 44px; font-weight: 400; line-height: 1.1; color: #1e1e1c; letter-spacing: -0.5px; }
  .right h2 em { font-style: italic; color: #2d5a3f; }
  .steps { display: flex; flex-direction: column; gap: 16px; }
  .step { display: flex; align-items: baseline; gap: 14px; }
  .step-letter { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 500; min-width: 30px; }
  .step-text { font-size: 18px; color: #3a3a38; }
  .l-accent { color: #2d5a3f; } .l-highlight { color: #c66b3d; }
  .quote { font-family: 'Fraunces', Georgia, serif; font-size: 22px; font-style: italic; font-weight: 400; color: #2d5a3f; margin-top: 10px; padding-top: 30px; border-top: 1px solid rgba(30,30,28,0.1); }
  .attr { font-size: 14px; color: #a5a59f; }
</style>
</head>
<body>
  <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr-sv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 1 L 10 5 L 0 9 z" fill="#2d5a3f" opacity="0.6"/>
      </marker>
    </defs>
    <circle cx="300" cy="300" r="220" fill="none" stroke="#e8e2d5" stroke-width="1" stroke-dasharray="4 6"/>
    <path d="M 375.24 93.27 A 220 220 0 0 1 506.74 224.76" fill="none" stroke="#2d5a3f" stroke-width="2" opacity="0.5" marker-end="url(#arr-sv)"/>
    <path d="M 506.74 375.24 A 220 220 0 0 1 375.24 506.73" fill="none" stroke="#2d5a3f" stroke-width="2" opacity="0.5" marker-end="url(#arr-sv)"/>
    <path d="M 224.76 506.73 A 220 220 0 0 1 93.27 375.24" fill="none" stroke="#2d5a3f" stroke-width="2" opacity="0.5" marker-end="url(#arr-sv)"/>
    <path d="M 93.27 224.76 A 220 220 0 0 1 224.76 93.27" fill="none" stroke="#2d5a3f" stroke-width="2" opacity="0.5" marker-end="url(#arr-sv)"/>
    <g><circle cx="300" cy="80"  r="54" fill="none" stroke="#2d5a3f" stroke-width="2"/><text x="300" y="95"  text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#2d5a3f">R</text></g>
    <g><circle cx="520" cy="300" r="54" fill="none" stroke="#2d5a3f" stroke-width="2"/><text x="520" y="315" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#2d5a3f">Ä</text></g>
    <g><circle cx="300" cy="520" r="54" fill="none" stroke="#c66b3d" stroke-width="2"/><text x="300" y="535" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#c66b3d">T</text></g>
    <g><circle cx="80"  cy="300" r="54" fill="none" stroke="#2d5a3f" stroke-width="2"/><text x="80"  y="315" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#2d5a3f">T</text></g>
    <text x="300" y="285" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="18" fill="#6b6b65">Professionellt</text>
    <text x="300" y="310" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="18" fill="#6b6b65">omdöme</text>
  </svg>
  <div class="right">
    <h2>Rätt verktyg vid <em>rätt tillfälle</em></h2>
    <div class="steps">
      <div class="step"><span class="step-letter l-accent">R</span><span class="step-text">Reflektera över lärandet som ska ske</span></div>
      <div class="step"><span class="step-letter l-accent">Ä</span><span class="step-text">Ämnet avgör</span></div>
      <div class="step"><span class="step-letter l-highlight">T</span><span class="step-text">Tillämpa rätt verktyg</span></div>
      <div class="step"><span class="step-letter l-accent">T</span><span class="step-text">Testa och utvärdera</span></div>
    </div>
    <p class="quote">"Är det fler verktyg eller bättre omdöme som behövs?"</p>
    <p class="attr">Johan Lindström · JL Skolutveckling AB · jlsu.se</p>
  </div>
</body>
</html>
