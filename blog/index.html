<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — choosewise.education</title>
  <meta name="description" content="Essays on AI in schools, education, and professional judgment.">
  <meta property="og:title" content="Blog — choosewise.education">
  <meta property="og:description" content="Essays on AI in schools, education, and professional judgment.">
  <meta property="og:image" content="/assets/images/brand/og-default.svg">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body>
  <div data-include="/assets/partials/header-en.html"></div>

  <main>
    <section class="page-hero container">
      <span class="eyebrow" data-reveal>Blog</span>
      <h1 data-reveal>Essays on AI, schools, and judgment.</h1>
      <p class="lede" data-reveal>Long-form thinking. Published when I have something worth saying.</p>
    </section>

    <section class="container section">
      <div class="blog-grid" data-source="/blog/posts-en.json" data-template="blog-post"></div>
      <p id="blog-empty" class="blog-empty" style="display:none;">No posts yet — the first one is coming. Check back soon.</p>
    </section>
  </main>

  <div data-include="/assets/partials/footer-en.html"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="/assets/js/include.js"></script>
  <script src="/assets/js/render-grid.js"></script>
  <script src="/assets/js/scroll-reveals.js"></script>
  <script>
    document.querySelector('[data-source="/blog/posts-en.json"]').addEventListener('grid:rendered', (e) => {
      if (e.detail.count === 0) document.getElementById('blog-empty').style.display = 'block';
    });
  </script>
</body>
</html>
